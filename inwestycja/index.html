<!DOCTYPE html>
<html lang="pl" data-site="megapolis">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inwestycja — Megapolis</title>
<!-- Fonty lokalne Ubuntu (z /fonts/) — @font-face w /css/style.css -->
<link rel="preload" href="/fonts/Ubuntu-Regular.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="/fonts/Ubuntu-Medium.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="/fonts/Ubuntu-Bold.ttf" as="font" type="font/ttf" crossorigin>
<link rel="stylesheet" href="/css/style.css">
<style>
  :root { --accent: #c9a96e; --bg: #06080e; }
  body { background: var(--bg); color: #e9ecf3; margin: 0; }
  .inw-hero {
    min-height: 72vh; display: grid; place-items: center; text-align: center;
    padding: 140px 20px 80px;
    background: linear-gradient(180deg, rgba(6,8,14,0.4) 0%, rgba(6,8,14,0.92) 100%), #0a0c15 center/cover no-repeat;
    position: relative;
  }
  .inw-hero__breadcrumbs { font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
  .inw-hero__breadcrumbs a { color: rgba(255,255,255,0.7); text-decoration:none; }
  .inw-hero__breadcrumbs a:hover { color: var(--accent); }
  .inw-hero__kicker { font-size:11px; letter-spacing:0.3em; text-transform:uppercase; color: var(--accent); margin-bottom: 22px; }
  .inw-hero__title { font-family:'Ubuntu', serif; font-size: clamp(42px, 7vw, 96px); font-weight: 500; line-height: 1.02; margin-bottom: 16px; }
  .inw-hero__subtitle { font-family:'Ubuntu', serif; font-size: clamp(18px, 2vw, 26px); color: rgba(255,255,255,0.7); max-width: 640px; margin: 0 auto 40px; }
  .inw-hero__badges { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
  .inw-hero__badge { display: inline-flex; align-items: center; padding: 6px 14px; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); }
  .inw-hero__badge--gold { border-color: var(--accent); color: var(--accent); }
  .inw-section { max-width: 1200px; margin: 0 auto; padding: 100px 20px; }
  .inw-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 60px; align-items: start; }
  @media (max-width: 900px) { .inw-grid { grid-template-columns: 1fr; } }
  .inw-kicker { color: var(--accent); font-size:11px; letter-spacing:0.28em; text-transform:uppercase; margin-bottom: 12px; }
  .inw-title { font-family:'Ubuntu', serif; font-size: clamp(30px, 4vw, 46px); margin-bottom: 22px; color: #fff; }
  .inw-prose { font-size: 17px; line-height: 1.7; color: rgba(255,255,255,0.78); }
  .inw-prose p { margin-bottom: 14px; }
  .inw-prose strong { color: #fff; }
  .inw-side-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 30px; }
  .inw-side-card__title { font-family:'Ubuntu', serif; font-size: 18px; margin-bottom: 20px; color: var(--accent); }
  .inw-side-card__row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 13px; }
  .inw-side-card__row:last-child { border: 0; }
  .inw-side-card__row-label { color: rgba(255,255,255,0.55); }
  .inw-side-card__row-value { color: #fff; font-weight: 500; }
  .inw-apts-wrap { margin-top: 40px; overflow-x: auto; }
  .inw-apts-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .inw-apt-filter { padding: 8px 16px; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; background: transparent; border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.65); cursor: pointer; transition: all 0.2s; }
  .inw-apt-filter:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
  .inw-apt-filter.is-active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .inw-apt-table { width: 100%; border-collapse: collapse; border: 1px solid rgba(255,255,255,0.06); font-size: 13px; min-width: 800px; }
  .inw-apt-table th { text-align: left; padding: 12px 16px; background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.6); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .inw-apt-table td { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .inw-apt-table tr:hover td { background: rgba(255,255,255,0.03); }
  .inw-apt-table__price { font-family:'Ubuntu', serif; color: var(--accent); font-size: 16px; }
  .inw-apt-table__price--old { color: rgba(255,255,255,0.4); text-decoration: line-through; font-size: 12px; font-family: inherit; margin-right: 8px; }
  .inw-apt-badge { display:inline-flex; padding: 2px 8px; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; }
  .inw-apt-badge--avail { background: rgba(74,222,128,0.12); color: #4ade80; }
  .inw-apt-badge--res { background: rgba(201,169,110,0.14); color: var(--accent); }
  .inw-apt-badge--sold { background: rgba(248,113,113,0.12); color: #f87171; }
  .inw-map { margin: 40px 0; background: #0a0c15; border: 1px solid rgba(255,255,255,0.08); height: 360px; display: grid; place-items: center; color: rgba(255,255,255,0.45); font-size: 13px; position: relative; overflow: hidden; }
  .inw-map__pin { position: absolute; width: 22px; height: 22px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 0 4px rgba(201,169,110,0.3), 0 0 0 12px rgba(201,169,110,0.12); animation: pin-pulse 2s ease-in-out infinite; }
  @keyframes pin-pulse { 0%,100%{ box-shadow: 0 0 0 4px rgba(201,169,110,0.3), 0 0 0 12px rgba(201,169,110,0.12); } 50%{ box-shadow: 0 0 0 4px rgba(201,169,110,0.45), 0 0 0 22px rgba(201,169,110,0.05); } }
  .inw-cta { background: linear-gradient(135deg, rgba(201,169,110,0.08), rgba(201,169,110,0.02)); border-top: 1px solid rgba(201,169,110,0.15); border-bottom: 1px solid rgba(201,169,110,0.15); padding: 90px 20px; text-align: center; }
  .inw-back { display: inline-flex; gap: 8px; color: var(--accent); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; padding: 8px 14px; border: 1px solid rgba(201,169,110,0.3); margin-bottom: 30px; text-decoration: none; }
  .inw-err { text-align:center; padding: 120px 20px; }
  .inw-err__title { font-family:'Ubuntu', serif; font-size: 40px; margin-bottom: 14px; }
</style>
</head>
<body>

<div class="top-bar" data-cms="topbar">
  <div class="container top-bar__inner">
    <span class="top-bar__text"><span class="top-bar__dot"></span><span data-cms-field="text"></span></span>
    <a href="#kontakt" class="top-bar__cta" data-cms-field="ctaLink"></a>
  </div>
</div>

<header class="header" style="position:sticky;top:0;z-index:50;background:rgba(6,8,14,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06)">
  <div class="container header__inner">
    <a class="header__logo" href="/"><div class="header__logo-mark">
      <svg class="header__logo-icon" viewBox="-1 8 57 34" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M54.46 39.33h-3.53v-3.47h-3.64l-4.46-2.31v5.78h-2.31l-.01-16.2h-1.15v-5.78h-6.94v21.98H30.1V26.6h-2.31V9.25h-9.25v30.08h-2.32v-16.2H11.6v16.2H9.28v-5.78L3.5 35.78v3.55H-.05v1.16h4.71v-3.91l3.47-1.43v5.34h4.62v-16.2h2.32v16.2h4.62V10.41h6.94v17.35h2.32v12.73h4.62V18.51h4.63v5.78h1.16v16.2h4.63v-5.04L47 37.03l2.76-.03v3.49h4.7v-1.16z" fill="#fff"/></svg>
      <span class="header__logo-text">Megapolis</span>
    </div></a>
    <nav class="header__nav">
      <ul class="nav__list">
        <li class="nav__item"><a class='nav__link' href='/' data-i18n="nav.home">Megapolis</a></li>
        <li class="nav__item"><a class='nav__link' href='/realizacje' data-i18n="nav.realizacje">Nasze realizacje</a></li>
        <li class="nav__item"><a class='nav__link' href='/kontakt' data-i18n="nav.contact">Kontakt</a></li>
      </ul>
    </nav>
    <div class="header__actions">
      <div class="lang-switch" data-lang-switcher></div>
    </div>
  </div>
</header>

<main id="inwRoot">
  <p style="text-align:center;padding:140px 20px;color:rgba(255,255,255,0.5)">Ladowanie...</p>
</main>

<footer class="footer" style="border-top:1px solid rgba(255,255,255,0.06);padding:40px 0;text-align:center">
  <div class="container">
    <p style="color:rgba(255,255,255,0.5);font-size:13px">&copy; 2026 Megapolis &middot; <a href="/" style="color:var(--accent)">Strona glowna</a></p>
  </div>
</footer>

<script src="/js/cms.js"></script>
<script>
(function () {
  'use strict';
  const pathMatch = location.pathname.match(/^\/(inwestycja|realizacja)\/([^\/]+)/);
  const urlParams = new URLSearchParams(location.search);
  const slug = (pathMatch && pathMatch[2]) || urlParams.get('slug');

  async function fetchJSON(p) { const r = await fetch('/api' + p); return r.ok ? r.json() : null; }
  function esc(s) { return String(s || '').replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function fmtPrice(p) { return (p || 0).toLocaleString('pl-PL') + ' PLN'; }
  function fmtStatus(s) { return s === 'available' ? 'Dostepne' : s === 'reserved' ? 'Zarezerwowane' : 'Sprzedane'; }

  async function render() {
    const root = document.getElementById('inwRoot');
    if (!slug) {
      root.innerHTML = `<div class="inw-err"><h1 class="inw-err__title">Brak inwestycji</h1><p style="color:rgba(255,255,255,0.65)">Wybierz inwestycje z listy.</p><a class="btn btn--pill btn--outline" href="/realizacje">Zobacz realizacje</a></div>`;
      return;
    }
    const [realizacje, apartments] = await Promise.all([
      fetchJSON('/content/realizacje'),
      fetchJSON('/thtg/apartments?investment=' + encodeURIComponent(slug)),
    ]);
    const rlz = (realizacje || []).find(r => r.slug === slug);
    if (!rlz) {
      root.innerHTML = `<div class="inw-err"><h1 class="inw-err__title">Nie znaleziono</h1><p style="color:rgba(255,255,255,0.65)">Inwestycja <code>${esc(slug)}</code> nie istnieje.</p><a class="btn btn--pill btn--outline" href="/realizacje">Zobacz wszystkie</a></div>`;
      return;
    }
    document.title = rlz.title + ' — Megapolis';
    const apts = (apartments && apartments.items) || [];
    const avail = apts.filter(a => a.status === 'available');
    const fromPrice = avail.length ? avail.reduce((m, a) => a.price < m ? a.price : m, Infinity) : 0;
    const avgPrice = avail.length ? Math.round(avail.reduce((s, a) => s + a.price / a.area, 0) / avail.length) : 0;

    root.innerHTML = `
      <section class="inw-hero" ${rlz.cover ? `style="background-image:linear-gradient(180deg, rgba(6,8,14,0.3) 0%, rgba(6,8,14,0.92) 100%), url('${rlz.cover}')"` : ''}>
        <div style="position:relative;z-index:2">
          <div class="inw-hero__breadcrumbs"><a href="/">Megapolis</a> / <a href="/realizacje">Realizacje</a> / ${esc(rlz.title)}</div>
          <div class="inw-hero__kicker">${esc(rlz.city)} &middot; ${rlz.year}</div>
          <h1 class="inw-hero__title">${esc(rlz.title)}</h1>
          <p class="inw-hero__subtitle">${esc((rlz.description || '').replace(/<[^>]+>/g,'').slice(0, 180))}</p>
          <div class="inw-hero__badges">
            <span class="inw-hero__badge inw-hero__badge--gold">${rlz.status === 'building' ? 'W budowie' : 'Zrealizowane'}</span>
            <span class="inw-hero__badge">${rlz.units} lokali</span>
            <span class="inw-hero__badge">${esc(rlz.area || '')}</span>
            <span class="inw-hero__badge">${esc(rlz.type)}</span>
          </div>
        </div>
      </section>

      <section class="inw-section">
        <a class="inw-back" href="/realizacje">&larr; Wszystkie inwestycje</a>
        <div class="inw-grid">
          <div>
            <div class="inw-kicker">O inwestycji</div>
            <h2 class="inw-title">${esc(rlz.title)}</h2>
            <div class="inw-prose">${rlz.description || '<p>Opis inwestycji jest w trakcie przygotowania.</p>'}</div>
            <div class="inw-map"><div class="inw-map__pin" style="top:50%;left:50%;transform:translate(-50%,-50%)"></div><span>Mapa Google Maps &middot; ${rlz.lat}, ${rlz.lng}</span></div>
          </div>
          <aside>
            <div class="inw-side-card">
              <div class="inw-side-card__title">Parametry</div>
              <div class="inw-side-card__row"><span class="inw-side-card__row-label">Miasto</span><span class="inw-side-card__row-value">${esc(rlz.city)}</span></div>
              <div class="inw-side-card__row"><span class="inw-side-card__row-label">Liczba lokali</span><span class="inw-side-card__row-value">${rlz.units}</span></div>
              <div class="inw-side-card__row"><span class="inw-side-card__row-label">Metraz</span><span class="inw-side-card__row-value">${esc(rlz.area || '—')}</span></div>
              <div class="inw-side-card__row"><span class="inw-side-card__row-label">Typ</span><span class="inw-side-card__row-value">${esc(rlz.type)}</span></div>
              <div class="inw-side-card__row"><span class="inw-side-card__row-label">Rok</span><span class="inw-side-card__row-value">${rlz.year}</span></div>
              <div class="inw-side-card__row"><span class="inw-side-card__row-label">Dostepne</span><span class="inw-side-card__row-value" style="color:var(--accent)">${avail.length}</span></div>
              ${fromPrice ? `<div class="inw-side-card__row"><span class="inw-side-card__row-label">Od</span><span class="inw-side-card__row-value" style="color:var(--accent)">${fmtPrice(fromPrice)}</span></div>` : ''}
              ${avgPrice ? `<div class="inw-side-card__row"><span class="inw-side-card__row-label">Sr. cena/m&sup2;</span><span class="inw-side-card__row-value">${avgPrice.toLocaleString('pl-PL')} PLN</span></div>` : ''}
            </div>
            <div style="margin-top:20px"><a href="#kontakt" class="btn btn--pill btn--full">Umow wizyte</a></div>
          </aside>
        </div>
      </section>

      <section class="inw-section" id="mieszkania">
        <div class="inw-kicker">Mieszkania &middot; dane THTG</div>
        <h2 class="inw-title">Dostepne lokale</h2>
        <div class="inw-apts-filters" id="inwFilters">
          <button class="inw-apt-filter is-active" data-f="all">Wszystkie (${apts.length})</button>
          <button class="inw-apt-filter" data-f="available">Dostepne (${apts.filter(a=>a.status==='available').length})</button>
          <button class="inw-apt-filter" data-f="reserved">Zarezerwowane (${apts.filter(a=>a.status==='reserved').length})</button>
          <button class="inw-apt-filter" data-f="sold">Sprzedane (${apts.filter(a=>a.status==='sold').length})</button>
          <button class="inw-apt-filter" data-f="promo">Promocja</button>
        </div>
        <div class="inw-apts-wrap">
          <table class="inw-apt-table">
            <thead><tr><th>Nr</th><th>Budynek</th><th>Pokoje</th><th>Metraz</th><th>Pietro</th><th>Strona</th><th>Cena</th><th>Status</th><th></th></tr></thead>
            <tbody id="inwAptBody">
              ${apts.map(a => {
                const cls = a.status === 'available' ? 'avail' : a.status === 'reserved' ? 'res' : 'sold';
                return `<tr data-status="${a.status}" data-promo="${a.priceOld ? '1' : '0'}">
                  <td>M.${esc(a.building)}.${a.floor}.${a.id.replace(/^a/,'')}</td>
                  <td>${esc(a.building)}</td>
                  <td>${a.rooms}</td>
                  <td>${a.area} m&sup2;</td>
                  <td>${a.floor}</td>
                  <td>${esc(a.direction || '')}</td>
                  <td><span class="inw-apt-table__price">${a.priceOld ? `<span class="inw-apt-table__price--old">${fmtPrice(a.priceOld)}</span>` : ''}${fmtPrice(a.price)}</span></td>
                  <td><span class="inw-apt-badge inw-apt-badge--${cls}">${fmtStatus(a.status)}</span></td>
                  <td>${a.status === 'available' ? `<button class="btn btn--ghost btn--sm" data-reserve="${a.id}">Rezerwuj</button>` : ''}</td>
                </tr>`;
              }).join('') || '<tr><td colspan="9" style="padding:40px;text-align:center;color:rgba(255,255,255,0.5)">Brak lokali w bazie.</td></tr>'}
            </tbody>
          </table>
        </div>
      </section>

      <section class="inw-cta" id="kontakt">
        <div class="inw-kicker">Kontakt</div>
        <h2 class="inw-title">Zapytaj o oferte</h2>
        <p style="color:rgba(255,255,255,0.7);max-width:600px;margin:0 auto 40px">Skontaktuj sie z doradca sprzedazy i umow prywatna prezentacje.</p>
        <form class="contact-form" style="max-width:560px;margin:0 auto;text-align:left" data-cms-form="reservation" novalidate>
          <input type="hidden" name="subject" id="inwSubject" value="Zapytanie o ${esc(rlz.title)}">
          <input type="hidden" name="apartmentId" id="inwApt" value="">
          <div class="contact-form__row contact-form__row--half">
            <div class="contact-form__field"><label>Imie i nazwisko *</label><input type="text" name="name" required></div>
            <div class="contact-form__field"><label>Telefon</label><input type="tel" name="phone"></div>
          </div>
          <div class="contact-form__row"><div class="contact-form__field"><label>Email *</label><input type="email" name="email" required></div></div>
          <div class="contact-form__row"><div class="contact-form__field"><label>Wiadomosc</label><textarea name="message" rows="3"></textarea></div></div>
          <label class="contact-form__checkbox"><input type="checkbox" name="privacy" required><span>Akceptuje polityke prywatnosci.</span></label>
          <button type="submit" class="btn btn--pill btn--full">Wyslij zapytanie</button>
        </form>
      </section>
    `;

    // Filter handling
    document.querySelectorAll('#inwFilters .inw-apt-filter').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#inwFilters .inw-apt-filter').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        const f = btn.dataset.f;
        document.querySelectorAll('#inwAptBody tr').forEach(tr => {
          if (!tr.dataset.status) return;
          const match = f === 'all' || (f === 'promo' ? tr.dataset.promo === '1' : tr.dataset.status === f);
          tr.style.display = match ? '' : 'none';
        });
      });
    });
    // Reserve buttons
    document.querySelectorAll('[data-reserve]').forEach(b => {
      b.addEventListener('click', () => {
        document.getElementById('inwApt').value = b.dataset.reserve;
        document.getElementById('inwSubject').value = 'Rezerwacja mieszkania ' + b.dataset.reserve + ' w ' + rlz.title;
        document.getElementById('kontakt').scrollIntoView({ behavior: 'smooth' });
      });
    });
    // Form submission
    const form = root.querySelector('form[data-cms-form]');
    if (form && !form.dataset.cmsWired) {
      form.dataset.cmsWired = '1';
      form.addEventListener('submit', async e => {
        e.preventDefault();
        const fd = new FormData(form); const body = {};
        fd.forEach((v,k) => body[k] = v);
        body.formType = 'reservation'; body.sourcePage = '/inwestycja/' + slug; body.site = 'megapolis';
        const btn = form.querySelector('[type="submit"]'); if (btn) btn.disabled = true;
        try {
          const res = await fetch('/api/forms/submit', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
          if (!res.ok) throw new Error('error');
          form.reset();
          let fb = form.querySelector('.cms-form-feedback');
          if (!fb) { fb = document.createElement('div'); fb.className='cms-form-feedback'; form.appendChild(fb); }
          fb.className='cms-form-feedback cms-form-feedback--success';
          fb.textContent='Zapytanie wyslane. Skontaktujemy sie w ciagu 24h.';
        } catch {
          let fb = form.querySelector('.cms-form-feedback');
          if (!fb) { fb = document.createElement('div'); fb.className='cms-form-feedback'; form.appendChild(fb); }
          fb.className='cms-form-feedback cms-form-feedback--error';
          fb.textContent='Blad. Sprobuj ponownie.';
        } finally { if (btn) btn.disabled = false; }
      });
    }
  }
  render();
})();
</script>
</body>
</html>
